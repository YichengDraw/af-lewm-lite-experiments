defaults:
  - _self_
  - data: pusht

output_model_name: aflewm_lite
subdir: runs/${data.dataset.name}/${output_model_name}

num_workers: 0
train_split: 0.9
seed: 3072
img_size: 224
patch_size: 14
encoder_scale: tiny
dump_object: True

trainer:
  max_epochs: 100
  devices: auto
  accelerator: gpu
  precision: bf16
  gradient_clip_val: 1.0

loader:
  batch_size: 8
  num_workers: ${num_workers}
  persistent_workers: False
  prefetch_factor: null
  pin_memory: True

optimizer:
  type: AdamW
  lr: 5e-5
  weight_decay: 1e-3

wandb:
  enabled: False
  config:
    entity: lewm
    project: lewm
    name: ${output_model_name}
    id: ${subdir}
    resume: allow
    log_model: False

wm:
  type: lewm
  history_size: 3
  num_preds: 1
  embed_dim: 192

predictor:
  depth: 6
  heads: 16
  mlp_dim: 2048
  dim_head: 64
  dropout: 0.1
  emb_dropout: 0.0

loss:
  sigreg:
    weight: 0.09
    kwargs:
      knots: 17
      num_proj: 1024

aflwm:
  enabled: True
  appearance_dim: 64
  projector_hidden_dim: 512
  stats_hidden_dim: 256
  loss:
    invariance_weight: 0.1
    independence_weight: 0.05
    stats_weight: 0.0
  augment:
    brightness: 0.25
    contrast: 0.25
    saturation: 0.15
    grayscale_prob: 0.1
    noise_std: 0.01
